<script>
(function() {
  try {
    var p = new URLSearchParams(window.location.search);
    if (p.get('theme')) { applyTheme(p.get('theme')); return; }
    var now = new Date(), y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
    function bt(mS,dS,mE,dE) { return now >= new Date(y,mS-1,dS) && now <= new Date(y,mE-1,dE); }
    function bty(yS,mS,dS,yE,mE,dE) { return now >= new Date(yS,mS-1,dS) && now <= new Date(yE,mE-1,dE); }
    var t = 'default';
    if (bty(2026,6,11,2026,7,19)) t = 'football';
    else if ((m===12&&d>=27)||(m===1&&d<=5)) t = 'newyear';
    else if (bt(1,6,3,19)) t = 'winter'; // UK winter (after New Year, before Spring)
    else if (m===2&&d>=10&&d<=16) t = 'valentine';
    else if (m===3&&d===17) t = 'st-patrick';
    else if (m===4&&d>=14&&d<=15) t = 'vishu';
    else if ((m===3&&d>=20)||(m===4&&d<=15)) t = 'spring';
    else if (bt(6,1,8,19)) t = 'summer';
    else if (bt(8,20,9,15)) t = 'onam';
    else if (bt(9,16,10,14)) t = 'autumn';
    else if (bt(10,15,11,5)) t = 'diwali';
    else if (m===10&&d===31) t = 'halloween';
    else if (m===11&&d===5) t = 'bonfire';
    else if (m===11&&d===11) t = 'remembrance';
    else if (m===12&&d<=26) t = 'xmas';

function applyTheme(t) {

  document.querySelectorAll('.theme-hero').forEach(function(el) { el.style.display = 'none'; });
  var h = document.querySelector('[data-theme-hero="'+t+'"]') || document.querySelector('[data-theme-hero="default"]') || document.querySelector('[data-theme-hero="fallback"]');
  if (h) h.style.display = '';
  var m = document.querySelector('meta[name="theme-color"]');

    m.content = c[t] || '#0f172a';
