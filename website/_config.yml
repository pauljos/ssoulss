title: SSoulSS
description: >
  Enterprise software products, AI engineering, and data consulting for healthcare, apparel, HSE, and scheduling. We build scalable applications and provide expert technology consulting.
tagline: "Technology with a Soul"
baseurl: ""
url: "https://ssoulss.com"
theme: "minimal-mistakes-jekyll"
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Ensure policies and legal pages are always included
include:
  - policies/
  - policies/privacy.md
  - policies/terms.md
  - policies/cookies.md

# minimal mistakes settings (keep defaults for now)
markdown: kramdown
highlighter: rouge

# where to place assets
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
